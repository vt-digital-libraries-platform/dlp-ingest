<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>VTDLP Ingest | Ingest Results</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    </head>
    <body>
        <div class="header-bar">
            <div class="logo-title">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="App Logo" class="app-logo">
                <h1>VTDLP Ingest</h1>
            </div>
            {% if user %}
                <div class="user-info">
                    <div>Hi {{user['email']}}!</div>
                    <div><a href="{{url_for('logout')}}">Logout</a></div>
                </div>
            {% endif %}
        </div>


        <h1>Ingest Complete!</h1>
        <p>Your ingest operation finished successfully.</p>
        <a href="/">Return to Ingest form</a>

        <h2>Ingest Results</h2>

        <div>
            <a href="/results/ingested.csv" download>
                <button>Download Ingested Items</button>
            </a>
        </div>
        <div>
            <a href="/results/updated.csv" download>
                <button>Download Updated Items</button>
            </a>
        </div>
        <div>
            <a href="/results/summary.csv" download>
                <button>Download Summary Sheet</button>
            </a>
        </div>
        <div>
            <a href="/results/errors.csv" download>
                <button>Download Error List</button>
            </a>
        </div>
    </body>
</html>
